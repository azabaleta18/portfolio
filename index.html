<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef, useState, useCallback } = React;

// ===================== useInViewAnimation =====================
function useInViewAnimation(threshold = 0.1) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('in-view');
          obs.unobserve(entry.target);
        }
      });
    }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return ref;
}

function Reveal({ as: Tag = 'div', delay = 0, className = '', children, ...rest }) {
  const ref = useInViewAnimation(0.1);
  const style = { ...(rest.style || {}), '--delay': `${delay}s` };
  return (
    <Tag ref={ref} className={`reveal ${className}`} {...rest} style={style}>
      {children}
    </Tag>
  );
}

// ===================== CustomCursor =====================
function CustomCursor() {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    const dot = dotRef.current;
    const ring = ringRef.current;
    if (!dot || !ring) return;
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;
    let raf;
    const onMove = (e) => {
      mx = e.clientX; my = e.clientY;
      dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
    };
    const tick = () => {
      rx += (mx - rx) * 0.18;
      ry += (my - ry) * 0.18;
      ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(tick);
    };
    tick();
    const handleOver = (e) => {
      if (e.target.closest('a, button, [data-hover], input, textarea, .proj-card')) {
        ring.classList.add('hover'); dot.classList.add('hover');
      }
    };
    const handleOut = (e) => {
      if (e.target.closest('a, button, [data-hover], input, textarea, .proj-card')) {
        ring.classList.remove('hover'); dot.classList.remove('hover');
      }
    };
    window.addEventListener('mousemove', onMove);
    document.addEventListener('mouseover', handleOver);
    document.addEventListener('mouseout', handleOut);
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseover', handleOver);
      document.removeEventListener('mouseout', handleOut);
    };
  }, []);
  return (
    <>
      <div ref={dotRef} className="cursor-dot" />
      <div ref={ringRef} className="cursor-ring" />
    </>
  );
}

// ===================== Navbar =====================
function Navbar() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 24);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const navLinks = [
    { label: 'Servicios', href: '#services' },
    { label: 'Proyectos', href: '#projects' },
    { label: 'IA', href: '#automation' },
    { label: 'Precios', href: '#pricing' },
  ];
  return (
    <nav
      className={`fixed top-0 left-0 right-0 z-40 px-8 md:px-12 transition-all duration-300 ${scrolled ? 'nav-scrolled' : ''}`}
      style={{ paddingTop: 22, paddingBottom: 22, backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', background: 'rgba(5, 10, 20, 0.55)', borderBottom: '1px solid var(--border)' }}
    >
      <div className="max-w-7xl mx-auto flex items-center justify-between">
        <a href="#top" className="font-serif text-2xl tracking-tight" style={{ fontStyle: 'italic', fontWeight: 700 }}>AZ</a>
        <div className="hidden md:flex items-center gap-10">
          {navLinks.map((l) => (
            <a key={l.href} href={l.href} className="text-sm font-medium transition-colors"
              style={{ color: 'rgba(240,246,255,0.7)' }}
              onMouseEnter={(e) => e.currentTarget.style.color = 'var(--text)'}
              onMouseLeave={(e) => e.currentTarget.style.color = 'rgba(240,246,255,0.7)'}
            >{l.label}</a>
          ))}
        </div>
        <a href="#contact" className="btn-primary nav-cta text-sm" style={{ padding: '10px 22px' }}>
          Hablemos
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
    </nav>
  );
}

// ===================== Hero =====================
function Hero({ heroVideoSrc }) {
  const videoRef = useRef(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    const onData = () => { setLoaded(true); v.play().catch(() => {}); };
    v.addEventListener('loadeddata', onData);
    return () => v.removeEventListener('loadeddata', onData);
  }, []);

  return (
    <section id="top" className="relative w-full overflow-hidden" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div className="absolute inset-0" style={{ background: 'radial-gradient(ellipse at 30% 20%, #102030 0%, #050A14 60%, #02060C 100%)', opacity: loaded ? 0 : 1, transition: 'opacity 0.8s ease', zIndex: 0 }} />
      <video ref={videoRef} muted autoPlay playsInline loop preload="auto" className="absolute inset-0 w-full h-full"
        style={{ objectFit: 'cover', opacity: loaded ? 0.55 : 0, transition: 'opacity 1.2s ease', zIndex: 0 }}>
        <source src={heroVideoSrc} type="video/mp4" />
      </video>
      <div className="absolute inset-0" style={{ background: 'linear-gradient(180deg, rgba(5,10,20,0.65) 0%, rgba(5,10,20,0.45) 40%, rgba(5,10,20,0.95) 100%)', zIndex: 1 }} />
      <div className="absolute inset-0" style={{ background: 'radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(5,10,20,0.6) 90%)', zIndex: 1 }} />

      <div className="hero-content relative max-w-6xl mx-auto px-8 md:px-12 w-full text-center" style={{ zIndex: 2, paddingTop: 120, paddingBottom: 60 }}>
        <Reveal delay={0} className="inline-flex items-center gap-3 glass" style={{ padding: '8px 16px', borderRadius: 999, marginBottom: 36 }}>
          <span className="dot-pulse" />
          <span className="font-mono" style={{ fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(240,246,255,0.85)' }}>Disponible para nuevos proyectos</span>
        </Reveal>

        <Reveal delay={0.1} as="h1" className="font-serif" style={{ fontSize: 'clamp(56px, 8vw, 120px)', fontWeight: 700, lineHeight: 0.96, letterSpacing: '-0.025em', marginBottom: 32 }}>
          <span style={{ display: 'block' }}>Diseño que convierte.</span>
          <span style={{ display: 'block', fontStyle: 'italic', color: 'rgba(240,246,255,0.78)' }}>Sistemas que trabajan solos.</span>
        </Reveal>

        <Reveal delay={0.2} as="p" className="mx-auto" style={{ maxWidth: 560, fontSize: 17, lineHeight: 1.6, color: 'var(--muted)', marginBottom: 44 }}>
          Diseño y desarrollo páginas web que venden, y construyo flujos de automatización con IA para que tu negocio funcione sin que tengas que estar encima.
        </Reveal>

        <Reveal delay={0.3} className="hero-btns flex flex-wrap items-center justify-center gap-4" style={{ marginBottom: 80 }}>
          <a href="#contact" className="btn-primary">
            Empezar un proyecto
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </a>
          <a href="#projects" className="btn-ghost">Ver proyectos</a>

          {c.sub && <span className="font-mono" style={{ fontSize: 12, color: 'var(--muted)', letterSpacing: '0.05em' }}>{c.sub}</span>}

        <p style={{ color: 'var(--muted)', fontSize: 14.5, lineHeight: 1.6, marginTop: 14 }}>{c.desc}</p>

      <div style={{ height: 1, background: 'var(--border)' }} />

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={c.primary ? '#00D4FF' : 'rgba(240,246,255,0.5)'} strokeWidth="2.5" style={{ flexShrink: 0, marginTop: 3 }}><path d="M5 12l5 5L20 7" /></svg>
            <span>{f}</span>
          </li>
        ))}
      </ul>
      <a href="#contact" className={c.primary ? 'btn-primary' : 'btn-ghost'} style={{ justifyContent: 'center' }}>
        {c.cta}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>

  return (

// ===================== Contact =====================
function Contact() {
  const [submitted, setSubmitted] = useState(false);
  const [form, setForm] = useState({ nombre: '', email: '', mensaje: '' });
  const onSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
    setTimeout(() => setSubmitted(false), 4000);
    setForm({ nombre: '', email: '', mensaje: '' });
  };
  const links = [
    { icon: '✉️', label: 'Email', value: 'hola@alfonsozabaleta.com', href: 'mailto:hola@alfonsozabaleta.com' },
    { icon: '💬', label: 'WhatsApp', value: '+598 99 123 456', href: '#' },
    { icon: '🔗', label: 'LinkedIn', value: 'linkedin.com/in/azabaleta', href: '#' },
  ];
  return (
    <section id="contact" className="relative resp-section" style={{ padding: '140px 32px' }}>
      <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16">
        <Reveal>
          <div className="label-mono" style={{ marginBottom: 16 }}>— Contacto</div>
          <h2 className="font-serif" style={{ fontSize: 'clamp(40px, 5vw, 64px)', fontWeight: 700, lineHeight: 1.05, letterSpacing: '-0.02em', marginBottom: 28 }}>Hagamos algo <em style={{ color: 'rgba(240,246,255,0.7)' }}>juntos</em>.</h2>
          <p style={{ color: 'var(--muted)', fontSize: 16, lineHeight: 1.7, marginBottom: 40, maxWidth: 460 }}>Contame qué necesitás. Si calza con lo que hago, te respondo en menos de 24 horas con una propuesta concreta.</p>
          <div className="flex flex-col gap-3">
            {links.map((l, i) => (
              <Reveal key={l.label} delay={0.1 + i * 0.08}>
                <a href={l.href} className="link-row">
                  <span style={{ fontSize: 20 }}>{l.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div className="font-mono" style={{ fontSize: 10.5, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--accent)', marginBottom: 4 }}>{l.label}</div>
                    <div style={{ fontSize: 15, fontWeight: 500 }}>{l.value}</div>
                  </div>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color: 'var(--muted)' }}><path d="M7 17L17 7M9 7h8v8" /></svg>
                </a>
              </Reveal>
            ))}
          </div>
        </Reveal>
        <Reveal delay={0.15}>
          <form onSubmit={onSubmit} className="glass" style={{ padding: 36, borderRadius: 20, display: 'flex', flexDirection: 'column', gap: 24 }}>
            <div><label className="field-label">Nombre</label><input type="text" placeholder="Cómo te llamás" required value={form.nombre} onChange={(e) => setForm({ ...form, nombre: e.target.value })} /></div>
            <div><label className="field-label">Email</label><input type="email" placeholder="tu@correo.com" required value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} /></div>
            <div><label className="field-label">Mensaje</label><textarea placeholder="Contame el proyecto, el problema o el plazo" required value={form.mensaje} onChange={(e) => setForm({ ...form, mensaje: e.target.value })} /></div>
            <button type="submit" className="btn-primary" style={{ justifyContent: 'center', marginTop: 8 }}>
              {submitted ? '✓ Mensaje enviado' : 'Enviar mensaje'}
              {!submitted && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>}
            </button>
          </form>
        </Reveal>
      </div>
    </section>
  );
}

  const links = [{ label: 'Servicios', href: '#services' }, { label: 'Proyectos', href: '#projects' }, { label: 'IA', href: '#automation' }, { label: 'Precios', href: '#pricing' }, { label: 'Contacto', href: '#contact' }];

// ===================== BottomNav =====================
function BottomNav() {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > window.innerHeight * 0.6);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <div className="fixed left-1/2 z-50" style={{ bottom: 24, transform: `translateX(-50%) translateY(${visible ? 0 : 80}px)`, opacity: visible ? 1 : 0, transition: 'transform 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease', display: 'flex', alignItems: 'center', gap: 14, padding: '10px 10px 10px 22px', borderRadius: 999, backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)', background: 'rgba(13, 31, 45, 0.85)', border: '1px solid var(--border)', boxShadow: '0 24px 60px -20px rgba(0, 0, 0, 0.6)' }}>
      <span className="font-serif" style={{ fontSize: 16, fontWeight: 700, fontStyle: 'italic', whiteSpace: 'nowrap' }}>Alfonso Zabaleta</span>
      <a href="#contact" className="btn-primary" style={{ padding: '8px 18px', fontSize: 13 }}>
        Hablemos
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </div>
  );
}
